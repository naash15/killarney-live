<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Killarney Live Timing</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-emerald-500 mb-4">LIVE RESULTS</h1>
        
        <div class="flex gap-2 mb-4">
            <input type="text" id="search" placeholder="Enter Car # (e.g. A1-55)" class="flex-grow p-3 rounded-xl bg-slate-900 border border-slate-700">
            <button onclick="exportCSV()" class="bg-blue-600 hover:bg-blue-500 px-4 rounded-xl font-bold border border-blue-500 text-sm">Export</button>
        </div>

        <div id="results" class="flex flex-col gap-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://killarney-live-default-rtdb.firebaseio.com/" }));
        let allRuns = [];

        onValue(ref(db, "runs"), (snapshot) => {
            allRuns = [];
            snapshot.forEach(child => {
                const run = child.val();
                if (run.left && run.right) allRuns.unshift(run);
            });
            render();
        });

        document.getElementById('search').addEventListener('input', render);

        window.render = () => {
            const filter = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('results');
            container.innerHTML = '';
            
            allRuns.filter(r => !filter || r.left.car.toLowerCase().includes(filter) || r.right.car.toLowerCase().includes(filter))
            .forEach(run => {
                const div = document.createElement('div');
                div.className = "bg-slate-900 p-3 rounded-xl border border-slate-800";
                div.innerHTML = `
                    <div class="grid grid-cols-2 gap-2 text-center text-xs">
                        <div class="${run.winner === 'Left' ? 'bg-emerald-900/30 border border-emerald-500' : 'bg-slate-950'} p-2 rounded">
                            <div class="font-bold">LEFT: ${run.left.car}</div>
                            <div>ET: ${run.left.et}s | ${run.left.speed} km/h</div>
                        </div>
                        <div class="${run.winner === 'Right' ? 'bg-emerald-900/30 border border-emerald-500' : 'bg-slate-950'} p-2 rounded">
                            <div class="font-bold">RIGHT: ${run.right.car}</div>
                            <div>ET: ${run.right.et}s | ${run.right.speed} km/h</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Filtered CSV Export
        window.exportCSV = () => {
            const filter = document.getElementById('search').value.toLowerCase();
            const filteredRuns = allRuns.filter(r => !filter || r.left.car.toLowerCase().includes(filter) || r.right.car.toLowerCase().includes(filter));
            
            if(filteredRuns.length === 0) return alert("No runs found to export.");

            let csv = "Time,Winner,Left_Car,Left_ET,Left_Speed,Right_Car,Right_ET,Right_Speed\n";
            filteredRuns.forEach(r => {
                csv += `"${r.timestamp || ''}","${r.winner || ''}","${r.left.car}","${r.left.et}","${r.left.speed}","${r.right.car}","${r.right.et}","${r.right.speed}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filter ? `Killarney_Times_${filter.toUpperCase()}.csv` : "Killarney_All_Times.csv";
            a.click();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Killarney Live Timing</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-emerald-500 mb-4">LIVE RESULTS</h1>
        <div id="results" class="flex flex-col gap-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://killarney-live-default-rtdb.firebaseio.com/" }));
        
        onValue(query(ref(db, "runs"), limitToLast(10)), (snapshot) => {
            const container = document.getElementById('results');
            container.innerHTML = '';
            const runs = [];
            snapshot.forEach(child => runs.unshift(child.val()));

            runs.forEach(run => {
                const div = document.createElement('div');
                div.className = "bg-slate-900 p-3 rounded-xl border border-slate-800";
                div.innerHTML = `
                    <div class="text-xs text-slate-500 font-bold mb-1">${run.class || 'GENERAL'}</div>
                    <div class="grid grid-cols-2 gap-2 text-center">
                        <div class="${run.winner === 'Left' ? 'bg-emerald-900/30 border border-emerald-500' : 'bg-slate-950'} p-2 rounded">
                            <div class="text-[10px] text-slate-400">LEFT</div>
                            <div class="font-mono font-bold">#${run.left.car}</div>
                            <div class="text-xs text-blue-300">${run.left.et}s</div>
                            <div class="text-xs text-slate-400">${run.left.speed} km/h</div>
                        </div>
                        <div class="${run.winner === 'Right' ? 'bg-emerald-900/30 border border-emerald-500' : 'bg-slate-950'} p-2 rounded">
                            <div class="text-[10px] text-slate-400">RIGHT</div>
                            <div class="font-mono font-bold">#${run.right.car}</div>
                            <div class="text-xs text-amber-300">${run.right.et}s</div>
                            <div class="text-xs text-slate-400">${run.right.speed} km/h</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        });
    </script>
</body>
</html>

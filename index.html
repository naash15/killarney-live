<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Killarney Live Timing</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-emerald-500 mb-4">LIVE RESULTS</h1>
        
        <div class="mb-5">
            <div class="flex gap-2">
                <input type="text" id="search" placeholder="Enter Car # (e.g. A1-55)" class="flex-grow p-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:outline-none focus:border-emerald-500">
                <button onclick="render()" class="bg-emerald-600 hover:bg-emerald-500 px-5 rounded-xl font-bold shadow-md text-white">Search</button>
            </div>
            <div class="flex justify-end mt-2">
                <button onclick="exportCSV()" class="text-xs text-slate-400 hover:text-blue-400 font-bold uppercase tracking-wider underline transition-colors">
                    Export Times as CSV
                </button>
            </div>
        </div>

        <div id="results" class="flex flex-col gap-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://killarney-live-default-rtdb.firebaseio.com/" }));
        let allRuns = [];

        onValue(ref(db, "runs"), (snapshot) => {
            allRuns = [];
            snapshot.forEach(child => {
                const run = child.val();
                if (run.left && run.right) allRuns.unshift(run);
            });
            render();
        });

        document.getElementById('search').addEventListener('input', render);

        window.render = () => {
            const filter = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('results');
            container.innerHTML = '';
            
            allRuns.filter(r => !filter || r.left.car.toLowerCase().includes(filter) || r.right.car.toLowerCase().includes(filter))
            .forEach(run => {
                const div = document.createElement('div');
                div.className = "bg-slate-900 p-3 rounded-xl border border-slate-800";
                div.innerHTML = `
                    <div class="grid grid-cols-2 gap-2 text-center text-xs">
                        <div class="${run.winner === 'Left' ? 'bg-emerald-900/30 border border-emerald-500' : 'bg-slate-950'} p-2 rounded">
                            <div class="font-bold text-[14px] text-white mb-1">LEFT: ${run.left.car}</div>
                            <div class="text-slate-300">ET: ${run.left.et}s | ${run.left.speed} km/h</div>
                        </div>
                        <div class="${run.winner === 'Right' ? 'bg-emerald-900/30 border border-emerald-500' : 'bg-slate-950'} p-2 rounded">
                            <div class="font-bold text-[14px] text-white mb-1">RIGHT: ${run.right.car}</div>
                            <div class="text-slate-300">ET: ${run.right.et}s | ${run.right.speed} km/h</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.exportCSV = () => {
            const filter = document.getElementById('search').value.toLowerCase();
            const filteredRuns = allRuns.filter(r => !filter || r.left.car.toLowerCase().includes(filter) || r.right.car.toLowerCase().includes(filter));
            
            if(filteredRuns.length === 0) return alert("No runs found to export.");

            let csv = "Time,Winner,Left_Car

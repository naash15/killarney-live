<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Pro Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans p-4">

    <main class="max-w-md mx-auto flex flex-col gap-4">
        <div class="flex justify-between items-center">
            <h1 class="font-black text-xl text-emerald-500">RACE CONTROL</h1>
            <button onclick="clearDatabase()" class="bg-red-900/30 text-red-400 px-3 py-1 rounded text-xs font-bold border border-red-900">CLEAR DB</button>
        </div>

        <input id="val-class" type="text" placeholder="Enter Class (e.g. A1)" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl font-bold uppercase">

        <div class="grid grid-cols-2 gap-4">
            <div id="box-Left" class="bg-slate-900 p-3 rounded-xl border border-blue-900">
                <h2 class="text-blue-400 font-bold mb-2">LEFT LANE</h2>
                <input id="car-Left" type="number" placeholder="Car #" class="w-full bg-slate-950 p-2 mb-1 rounded font-mono">
                <input id="et-Left" type="number" step="0.001" placeholder="ET" class="w-full bg-slate-950 p-2 mb-1 rounded font-mono">
                <input id="speed-Left" type="number" placeholder="Speed" class="w-full bg-slate-950 p-2 rounded font-mono">
                <button onclick="setWinner('Left')" class="mt-2 w-full py-1 bg-slate-800 rounded font-bold text-xs" id="win-Left">SELECT WINNER</button>
            </div>
            <div id="box-Right" class="bg-slate-900 p-3 rounded-xl border border-amber-900">
                <h2 class="text-amber-400 font-bold mb-2">RIGHT LANE</h2>
                <input id="car-Right" type="number" placeholder="Car #" class="w-full bg-slate-950 p-2 mb-1 rounded font-mono">
                <input id="et-Right" type="number" step="0.001" placeholder="ET" class="w-full bg-slate-950 p-2 mb-1 rounded font-mono">
                <input id="speed-Right" type="number" placeholder="Speed" class="w-full bg-slate-950 p-2 rounded font-mono">
                <button onclick="setWinner('Right')" class="mt-2 w-full py-1 bg-slate-800 rounded font-bold text-xs" id="win-Right">SELECT WINNER</button>
            </div>
        </div>

        <button onclick="submitRun()" class="bg-emerald-600 p-4 rounded-xl font-black text-xl uppercase shadow-lg">Print Pits & Send</button>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const pass = prompt("Enter PIN:");
        if(pass !== "1234") window.location.reload();

        const db = getDatabase(initializeApp({ databaseURL: "https://killarney-live-default-rtdb.firebaseio.com/" }));
        let winner = '';

        window.setWinner = (lane) => {
            winner = lane;
            document.getElementById('win-Left').className = lane === 'Left' ? "mt-2 w-full py-1 bg-emerald-600 rounded font-bold text-xs" : "mt-2 w-full py-1 bg-slate-800 rounded font-bold text-xs";
            document.getElementById('win-Right').className = lane === 'Right' ? "mt-2 w-full py-1 bg-emerald-600 rounded font-bold text-xs" : "mt-2 w-full py-1 bg-slate-800 rounded font-bold text-xs";
        }

        window.submitRun = () => {
            const data = {
                class: document.getElementById('val-class').value,
                left: { car: document.getElementById('car-Left').value || 0, et: document.getElementById('et-Left').value || 0, speed: document.getElementById('speed-Left').value || 0 },
                right: { car: document.getElementById('car-Right').value || 0, et: document.getElementById('et-Right').value || 0, speed: document.getElementById('speed-Right').value || 0 },
                winner: winner,
                timestamp: Date.now()
            };
            push(ref(db, "runs"), data).then(() => alert("Data Sent!"));
        }

        window.clearDatabase = () => {
            if(confirm("Wipe all data?")) remove(ref(db, "runs"));
        }
    </script>
</body>
</html>
